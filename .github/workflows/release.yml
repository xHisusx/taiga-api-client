name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x which already supports Trusted Publishing
          # (>= 11.5.1). Avoids the fragile `npm install -g npm@latest` upgrade
          # that breaks Node 22's bundled npm 10.x in-place.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm version supports Trusted Publishing
        run: |
          NPM_VERSION=$(npm --version)
          echo "Using npm $NPM_VERSION"
          node -e "const v=process.argv[1].split('.').map(Number); if(v[0]<11||(v[0]===11&&v[1]<5)||(v[0]===11&&v[1]===5&&v[2]<1)){console.error('npm '+process.argv[1]+' is too old for Trusted Publishing (need >= 11.5.1)');process.exit(1)}" "$NPM_VERSION"

      - name: Verify release tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match package.json version '$PKG_VERSION'"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - run: bun install --frozen-lockfile

      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

      - name: Publish to npm via Trusted Publishing (OIDC)
        run: npm publish --access public
